<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理画面 - FREE PORT</title>
<link rel="stylesheet" href="css/shared.css">
<style>
body{background:#0e0e0e;color:#faf9f6;font-family:'Noto Sans JP',sans-serif}
.admin-wrap{max-width:900px;margin:0 auto;padding:20px}

/* ログイン画面 */
.login-overlay{position:fixed;inset:0;background:#0e0e0e;z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{text-align:center;max-width:360px;width:100%;padding:0 20px}
.login-box h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.06em;margin-bottom:8px}
.login-box p{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:32px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#faf9f6;font-size:14px;outline:none;margin-bottom:16px;text-align:center;letter-spacing:0.1em}
.login-input:focus{border-color:var(--rust)}
.login-btn{width:100%;padding:14px;background:var(--rust);color:#faf9f6;border:2px solid var(--rust);font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.3s}
.login-btn:hover{background:transparent;color:var(--rust)}
.login-error{color:#e74c3c;font-size:12px;margin-top:8px;display:none}

/* タブ */
.page-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:32px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:12px}
.page-tab{padding:8px 16px;font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;border:1px solid transparent;transition:all 0.2s;background:none}
.page-tab:hover{color:rgba(255,255,255,0.7)}
.page-tab.active{color:var(--rust);border-color:var(--rust)}

/* セクション */
.editor-section{margin-bottom:40px;border:1px solid rgba(255,255,255,0.08);padding:24px;background:rgba(255,255,255,0.02)}
.editor-section h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.06em;color:var(--rust);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.editor-section h3 button{font-size:11px;padding:4px 12px;background:none;color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.1);cursor:pointer}
.editor-section h3 button:hover{color:#e74c3c;border-color:#e74c3c}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--rust);margin-bottom:6px;font-family:'Barlow Condensed',sans-serif}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#faf9f6;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.field input:focus,.field textarea:focus{border-color:var(--rust)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ボタン */
.save-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;background:var(--rust);color:#faf9f6;border:2px solid var(--rust);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-top:16px}
.save-btn:hover{background:transparent;color:var(--rust)}
.save-btn:disabled{opacity:0.4;pointer-events:none}
.add-btn{padding:8px 20px;background:none;color:rgba(255,255,255,0.4);border:1px dashed rgba(255,255,255,0.15);font-size:12px;cursor:pointer;width:100%;margin-top:8px;transition:all 0.2s}
.add-btn:hover{color:var(--rust);border-color:var(--rust)}

/* タグ入力 */
.tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);min-height:40px}
.tag-chip{font-size:11px;padding:4px 10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);display:flex;align-items:center;gap:6px}
.tag-chip .remove{cursor:pointer;color:rgba(255,255,255,0.3)}
.tag-chip .remove:hover{color:#e74c3c}

/* ステータス */
.status-msg{position:fixed;bottom:20px;right:20px;padding:12px 24px;font-size:13px;z-index:100;transition:all 0.3s;transform:translateY(100px);opacity:0}
.status-msg.show{transform:translateY(0);opacity:1}
.status-msg.success{background:#27ae60;color:#fff}
.status-msg.error{background:#e74c3c;color:#fff}

/* ヘッダー */
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.admin-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.06em}
.admin-header a{font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none}
.admin-header a:hover{color:var(--rust)}

@media(max-width:768px){
  .field-row{grid-template-columns:1fr}
  .page-tabs{gap:2px}
  .page-tab{padding:6px 10px;font-size:11px}
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>ADMIN</h1>
    <p>管理画面にログイン</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="パスワードを入力">
    <button class="login-btn" id="loginBtn">LOGIN</button>
    <div class="login-error" id="loginError">パスワードが正しくありません</div>
    <a href="javascript:history.back()" style="display:inline-block;margin-top:24px;font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none">← 戻る</a>
  </div>
</div>

<!-- 管理画面本体 -->
<div class="admin-wrap" id="adminArea" style="display:none">
  <div class="admin-header">
    <h1>FREE PORT 管理画面</h1>
    <a href="index.html">サイトに戻る</a>
  </div>

  <!-- ページタブ -->
  <div class="page-tabs" id="pageTabs">
    <button class="page-tab active" data-page="index">INDEX</button>
    <button class="page-tab" data-page="camp">CAMP</button>
    <button class="page-tab" data-page="coffee">COFFEE</button>
    <button class="page-tab" data-page="gear">GEAR</button>
    <button class="page-tab" data-page="goods">GOODS</button>
    <button class="page-tab" data-page="furniture">FURNITURE</button>
    <button class="page-tab" data-page="about">ABOUT</button>
    <button class="page-tab" data-page="access">ACCESS</button>
    <button class="page-tab" data-page="footer">FOOTER</button>
    <button class="page-tab" data-page="password" style="margin-left:auto;color:rgba(255,255,255,0.25)">PASSWORD</button>
  </div>

  <!-- エディタ本体 -->
  <div id="editorArea">
    <p style="color:rgba(255,255,255,0.3);font-size:13px">データを読み込み中...</p>
  </div>

  <!-- 保存ボタン + TOPへ戻る -->
  <div style="display:flex;gap:12px;align-items:center;margin-top:16px">
    <button class="save-btn" id="saveBtn" style="display:none;margin-top:0">保存する</button>
    <button class="save-btn" id="scrollTopBtn" style="display:none;margin-top:0;background:transparent;color:var(--rust)" onclick="window.scrollTo({top:0,behavior:'smooth'})">TOP</button>
  </div>
</div>

<div class="status-msg" id="statusMsg"></div>

<script type="module">
import { savePageData as firestoreSave, loadPageData as firestoreLoad, resizeImage } from './js/firebase.js';
(function(){
  // ====== 設定 ======
  var password = '';
  var currentPage = 'index';
  var pageData = {};
  var specialPages = ['index', 'footer', 'password'];

  // ====== ログイン ======
  var loginOverlay = document.getElementById('loginOverlay');
  var adminArea = document.getElementById('adminArea');
  var passwordInput = document.getElementById('passwordInput');
  var loginBtn = document.getElementById('loginBtn');
  var loginError = document.getElementById('loginError');

  // セッション確認: sessionStorageにパスワードがあっても必ずFirestoreと照合
  if (sessionStorage.getItem('fp_admin_pw')) {
    var sessionPw = sessionStorage.getItem('fp_admin_pw');
    firestoreLoad('password').then(function(fsData) {
      var checkPw = (fsData && fsData.value) ? fsData.value : '0000';
      if (sessionPw === checkPw) {
        password = sessionPw;
        loginOverlay.style.display = 'none';
        adminArea.style.display = 'block';
        loadPageData(currentPage);
      } else {
        // パスワードが変更されている → セッション破棄、再ログイン要求
        sessionStorage.removeItem('fp_admin_pw');
      }
    }).catch(function(err) {
      console.error('Firestore loadPageData(password) error:', err);
      // 接続エラー時は再ログインを要求（セッションは保持）
    });
  }

  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    var pw = passwordInput.value;
    if (!pw) return;

    // Firestoreからパスワードを取得 → なければデフォルト '0000'
    firestoreLoad('password').then(function(fsData) {
      var checkPw = (fsData && fsData.value) ? fsData.value : '0000';
      if (pw === checkPw) {
        password = pw;
        sessionStorage.setItem('fp_admin_pw', pw);
        loginOverlay.style.display = 'none';
        adminArea.style.display = 'block';
        loadPageData(currentPage);
      } else {
        loginError.textContent = 'パスワードが正しくありません';
        loginError.style.display = 'block';
      }
    }).catch(function(err) {
      loginError.textContent = 'Firestore接続エラー: ' + (err && err.message ? err.message : err);
      loginError.style.display = 'block';
      console.error('Firestore loadPageData(password) error:', err);
    });
  }

      document.querySelectorAll('.page-tab').forEach(function(t) { t.classList.remove('active'); });

  // ====== データ読み込み（Firestoreのみ） ======
  function loadPageData(page) {
    var editor = document.getElementById('editorArea');
    editor.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:13px">データを読み込み中...</p>';
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('scrollTopBtn').style.display = 'none';

    // パスワードページは特殊
    if (page === 'password') {
      renderPasswordEditor();
      return;
    }

    firestoreLoad(page).then(function(fsData) {
      // Firestoreにデータがあればそれを使用、なければデフォルトデータ
      if (fsData) {
        pageData = fsData;
      } else {
        pageData = defaultData[page] ? JSON.parse(JSON.stringify(defaultData[page])) : { sections:[], plans:[], options:[], images:[] };
      }
      // ページタイプに応じて描画
      if (page === 'index') renderIndexEditor(pageData);
      else if (page === 'footer') renderFooterEditor(pageData);
      else renderEditor(page, pageData);
      document.getElementById('saveBtn').style.display = 'inline-flex';
      document.getElementById('scrollTopBtn').style.display = 'inline-flex';
    }).catch(function(err) {
      editor.innerHTML = '<p style="color:#e74c3c;font-size:13px">Firestoreに接続できません。インターネット接続を確認してください。<br>' + (err && err.message ? err.message : '') + '</p>';
    });
  }

  // ====== PASSWORD エディタ ======
  function renderPasswordEditor() {
    var editor = document.getElementById('editorArea');
    var html = '';
    html += '<h2 style="font-family:Bebas Neue,sans-serif;font-size:18px;color:rgba(255,255,255,0.5);margin-bottom:16px;letter-spacing:0.1em">PASSWORD CHANGE</h2>';
    html += '<div class="editor-section">';
    html += '<h3>パスワード変更</h3>';
    html += '<div class="field"><label>現在のパスワード</label><input type="password" id="pw_current" autocomplete="off"></div>';
    html += '<div class="field"><label>新しいパスワード</label><input type="password" id="pw_new" autocomplete="off"></div>';
    html += '<div class="field"><label>新しいパスワード（確認）</label><input type="password" id="pw_confirm" autocomplete="off"></div>';
    html += '<button class="save-btn" id="changePwBtn" style="margin-top:8px">パスワードを変更</button>';
    html += '<p id="pw_msg" style="margin-top:12px;font-size:13px;display:none"></p>';
    html += '</div>';
    editor.innerHTML = html;

    document.getElementById('changePwBtn').addEventListener('click', function() {
      var cur = document.getElementById('pw_current').value;
      var nw = document.getElementById('pw_new').value;
      var conf = document.getElementById('pw_confirm').value;
      var msg = document.getElementById('pw_msg');

      // Firestoreから現在のパスワードを取得して照合
      firestoreLoad('password').then(function(fsData) {
        var currentPw = (fsData && fsData.value) ? fsData.value : '0000';

        if (cur !== currentPw) {
          msg.style.display = 'block'; msg.style.color = '#e74c3c'; msg.textContent = '現在のパスワードが正しくありません';
          return;
        }
        if (!nw || nw.length < 4) {
          msg.style.display = 'block'; msg.style.color = '#e74c3c'; msg.textContent = '新しいパスワードは4文字以上で入力してください';
          return;
        }
        if (nw !== conf) {
          msg.style.display = 'block'; msg.style.color = '#e74c3c'; msg.textContent = '新しいパスワードが一致しません';
          return;
        }
        // Firestoreに保存
        firestoreSave('password', { value: nw }).then(function() {
          sessionStorage.setItem('fp_admin_pw', nw);
          msg.style.display = 'block'; msg.style.color = '#27ae60';
          msg.textContent = 'パスワードを変更しました（全端末で有効）';
          document.getElementById('pw_current').value = '';
          document.getElementById('pw_new').value = '';
          document.getElementById('pw_confirm').value = '';
        }).catch(function(err) {
          msg.style.display = 'block'; msg.style.color = '#e74c3c';
          msg.textContent = '保存失敗: ' + (err && err.message ? err.message : err) + ' (code: ' + (err && err.code ? err.code : 'unknown') + ')';
          console.error('Firestore savePageData(password) error:', err);
        });
      }).catch(function(err) {
        msg.style.display = 'block'; msg.style.color = '#e74c3c';
        msg.textContent = 'Firestore読込失敗: ' + (err && err.message ? err.message : err);
        console.error('Firestore loadPageData(password) error:', err);
      });
    });
  }

      html += '<p style="color:rgba(255,255,255,0.25);font-size:12px;margin-bottom:16px">画像データがありません</p>';
    }
    html += '<button class="add-btn" onclick="addImage()">+ 画像を追加</button>';

    editor.innerHTML = html;

    // ファイル選択のイベントを設定
    document.querySelectorAll('.img-file-input').forEach(function(input) {
      input.addEventListener('change', handleImageSelect);
    });
  }

  function renderSectionEditor(sec, index) {
    return '<div class="editor-section" data-type="section" data-index="' + index + '">' +
      '<h3>SECTION: ' + (sec.section_key || 'new') +
      '<button onclick="removeItem(\'section\',' + index + ')">削除</button></h3>' +
      '<div class="field"><label>セクションキー</label><input name="section_key" value="' + esc(sec.section_key) + '"></div>' +
      '<div class="field-row">' +
        '<div class="field"><label>ラベル（日本語）</label><input name="label_ja" value="' + esc(sec.label_ja) + '"></div>' +
        '<div class="field"><label>ラベル（英語）</label><input name="label_en" value="' + esc(sec.label_en) + '"></div>' +
      '</div>' +
      '<div class="field"><label>タイトル</label><input name="title" value="' + esc(sec.title) + '"></div>' +
      '<div class="field"><label>本文1</label><textarea name="body" rows="3">' + esc(sec.body) + '</textarea></div>' +
      '<div class="field"><label>本文2</label><textarea name="body2" rows="3">' + esc(sec.body2) + '</textarea></div>' +
      '<div class="field"><label>表示順</label><input name="order" type="number" value="' + (sec.order || 0) + '" style="width:80px"></div>' +
    '</div>';
  }

  function renderPlanEditor(plan, index) {
    return '<div class="editor-section" data-type="plan" data-index="' + index + '">' +
      '<h3>PLAN: ' + (plan.name_en || 'new') +
      '<button onclick="removeItem(\'plan\',' + index + ')">削除</button></h3>' +
      '<div class="field"><label>プランキー</label><input name="plan_key" value="' + esc(plan.plan_key) + '"></div>' +
      '<div class="field-row">' +
        '<div class="field"><label>名前（英語）</label><input name="name_en" value="' + esc(plan.name_en) + '"></div>' +
        '<div class="field"><label>名前（日本語）</label><input name="name_ja" value="' + esc(plan.name_ja) + '"></div>' +
      '</div>' +
      '<div class="field"><label>価格</label><input name="price" value="' + esc(plan.price) + '"></div>' +
      '<div class="field"><label>説明1</label><textarea name="description" rows="3">' + esc(plan.description) + '</textarea></div>' +
      '<div class="field"><label>説明2</label><textarea name="description2" rows="2">' + esc(plan.description2) + '</textarea></div>' +
      '<div class="field"><label>タグ（カンマ区切り）</label><input name="tags" value="' + esc(plan.tags) + '"></div>' +
      '<div class="field"><label>表示順</label><input name="order" type="number" value="' + (plan.order || 0) + '" style="width:80px"></div>' +
    '</div>';
  }

  function renderOptionEditor(opt, index) {
    return '<div class="editor-section" data-type="option" data-index="' + index + '">' +
      '<h3>OPTION: ' + (opt.item_name || 'new') +
      '<button onclick="removeItem(\'option\',' + index + ')">削除</button></h3>' +
      '<div class="field-row">' +
        '<div class="field"><label>グループキー</label><input name="group_key" value="' + esc(opt.group_key) + '"></div>' +
        '<div class="field"><label>グループ名（英語）</label><input name="group_name_en" value="' + esc(opt.group_name_en) + '"></div>' +
      '</div>' +
      '<div class="field"><label>グループ名（日本語）</label><input name="group_name_ja" value="' + esc(opt.group_name_ja) + '"></div>' +
      '<div class="field-row">' +
        '<div class="field"><label>アイテム名</label><input name="item_name" value="' + esc(opt.item_name) + '"></div>' +
        '<div class="field"><label>価格</label><input name="price" value="' + esc(opt.price) + '"></div>' +
      '</div>' +
      '<div class="field"><label>表示順</label><input name="order" type="number" value="' + (opt.order || 0) + '" style="width:80px"></div>' +
    '</div>';
  }

  function renderImageEditor(img, index) {
    var preview = '';
    if (img.image_url) {
      preview = '<div style="margin-bottom:12px;width:200px;height:130px;background-image:url(\'' + esc(img.image_url) + '\');background-size:cover;background-position:' + (img.position || 'center') + ';border:1px solid rgba(255,255,255,0.1)"></div>';
    }
    return '<div class="editor-section" data-type="image" data-index="' + index + '">' +
      '<h3>IMAGE: ' + (img.section_key || 'new') +
      '<button onclick="removeItem(\'image\',' + index + ')">削除</button></h3>' +
      preview +
      '<div class="field-row">' +
        '<div class="field"><label>セクションキー</label><input name="section_key" value="' + esc(img.section_key) + '"></div>' +
        '<div class="field"><label>ALTテキスト</label><input name="alt" value="' + esc(img.alt) + '"></div>' +
      '</div>' +
      '<div class="field"><label>画像URL（imagesフォルダのパス or 外部URL）</label><input name="image_url" value="' + esc(img.image_url) + '" class="img-url-input"></div>' +
      '<div class="field"><label>画像ファイルを選択（imagesフォルダに保存済みの場合は不要）</label>' +
        '<input type="file" accept="image/*" class="img-file-input" data-index="' + index + '" style="font-size:12px;color:rgba(255,255,255,0.4)">' +
      '</div>' +
      '<div class="field-row">' +
        '<div class="field"><label>表示位置（CSS）</label><input name="position" value="' + esc(img.position || 'center') + '" placeholder="center"></div>' +
        '<div class="field"><label>表示順</label><input name="order" type="number" value="' + (img.order || 0) + '" style="width:80px"></div>' +
      '</div>' +
    '</div>';
  }

  function handleImageSelect(e) {
    var file = e.target.files[0];
    if (!file) return;
    var section = e.target.closest('.editor-section');
    var urlInput = section.querySelector('.img-url-input');

    // 画像をリサイズ・圧縮してbase64に変換（Firestore保存用）
    resizeImage(file, 1200, 900).then(function(base64DataUrl) {
      // base64データURLを画像URLフィールドに設定
      urlInput.value = base64DataUrl;
      // プレビュー表示
      var existingPreview = section.querySelector('div[style*="background-image"]');
      if (existingPreview) {
        existingPreview.style.backgroundImage = 'url(' + base64DataUrl + ')';
      } else {
        var preview = document.createElement('div');
        preview.style.cssText = 'margin-bottom:12px;width:200px;height:130px;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,0.1)';
        preview.style.backgroundImage = 'url(' + base64DataUrl + ')';
        section.querySelector('h3').after(preview);
      }
      showStatus('画像を圧縮してセットしました（保存ボタンでFirestoreに反映）', 'success');
    });
  }

  function esc(val) {
    if (val === undefined || val === null) return '';
    return String(val).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ====== 追加・削除 ======
  window.addSection = function() {
    if (!pageData.sections) pageData.sections = [];
    pageData.sections.push({ section_key: 'new_section', label_ja: '', label_en: '', title: '', body: '', body2: '', order: pageData.sections.length });
    renderEditor(currentPage, pageData);
  };
  window.addPlan = function() {
    if (!pageData.plans) pageData.plans = [];
    pageData.plans.push({ plan_key: 'new_plan', name_en: '', name_ja: '', price: '', description: '', description2: '', tags: '', order: pageData.plans.length });
    renderEditor(currentPage, pageData);
  };
  window.addOption = function() {
    if (!pageData.options) pageData.options = [];
    pageData.options.push({ group_key: '', group_name_en: '', group_name_ja: '', item_name: '', price: '', order: pageData.options.length });
    renderEditor(currentPage, pageData);
  };
  window.addImage = function() {
    if (!pageData.images) pageData.images = [];
    pageData.images.push({ section_key: 'new_image', image_url: '', alt: '', position: 'center', order: pageData.images.length });
    renderEditor(currentPage, pageData);
  };
  window.removeItem = function(type, index) {
    if (!confirm('削除しますか？')) return;
    var map = { section: 'sections', plan: 'plans', option: 'options', image: 'images' };
    pageData[map[type]].splice(index, 1);
    renderEditor(currentPage, pageData);
  };

  // ====== 保存 ======
  document.getElementById('saveBtn').addEventListener('click', function() {
    var btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    var saveData;
    if (currentPage === 'index') {
      collectIndexData();
      saveData = pageData;
    } else if (currentPage === 'footer') {
      collectFooterData();
      saveData = pageData;
    } else {
      collectFormData();
      saveData = {
        sections: pageData.sections,
        plans: pageData.plans,
        options: pageData.options,
        images: pageData.images
      };
    }

    // Firestoreに保存
    firestoreSave(currentPage, saveData).then(function() {
      btn.disabled = false;
      btn.textContent = '保存する';
      showStatus('保存しました（全端末で反映）', 'success');
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = '保存する';
      showStatus('保存失敗: ' + (err && err.message ? err.message : err), 'error');
      console.error('Firestore savePageData(' + currentPage + ') error:', err);
    });
  });

  function collectIndexData() {
    var editor = document.getElementById('editorArea');
    pageData.bg_image = (editor.querySelector('[name="bg_image"]') || {}).value || '';
    pageData.tagline = (editor.querySelector('[name="tagline"]') || {}).value || '';

    pageData.gate_buttons = [];
    editor.querySelectorAll('[data-type="gate_button"]').forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input,select,textarea').forEach(function(inp) {
        if (inp.name) obj[inp.name] = inp.value;
      });
      obj.id = obj.en ? obj.en.toLowerCase().replace(/[^a-z]/g, '_') : 'btn';
      pageData.gate_buttons.push(obj);
    });

    pageData.shop_cards = [];
    editor.querySelectorAll('[data-type="shop_card"]').forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input,select,textarea').forEach(function(inp) {
        if (inp.name && inp.type !== 'file') obj[inp.name] = inp.value;
      });
      obj.id = obj.en ? obj.en.toLowerCase().replace(/[^a-z]/g, '_') : 'card';
      pageData.shop_cards.push(obj);
    });
  }

  function collectFooterData() {
    var editor = document.getElementById('editorArea');
    pageData.location_top = (editor.querySelector('[name="location_top"]') || {}).value || '';
    pageData.location_shop = (editor.querySelector('[name="location_shop"]') || {}).value || '';
    pageData.instagram_url = (editor.querySelector('[name="instagram_url"]') || {}).value || '';
    pageData.instagram_label = (editor.querySelector('[name="instagram_label"]') || {}).value || '';

    pageData.links = [];
    editor.querySelectorAll('[data-type="footer_link"]').forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input').forEach(function(inp) {
        if (inp.name) obj[inp.name] = inp.value;
      });
      obj.id = obj.label ? obj.label.toLowerCase().replace(/[^a-z]/g, '_') : 'link';
      pageData.links.push(obj);
    });
  }

  function collectFormData() {
    var sections = document.querySelectorAll('[data-type="section"]');
    pageData.sections = [];
    sections.forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input,textarea').forEach(function(inp) {
        obj[inp.name] = inp.value;
      });
      obj.page = currentPage;
      obj.id = obj.section_key;
      pageData.sections.push(obj);
    });

    var plans = document.querySelectorAll('[data-type="plan"]');
    pageData.plans = [];
    plans.forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input,textarea').forEach(function(inp) {
        obj[inp.name] = inp.value;
      });
      obj.page = currentPage;
      obj.id = obj.plan_key;
      pageData.plans.push(obj);
    });

    var options = document.querySelectorAll('[data-type="option"]');
    pageData.options = [];
    options.forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input,textarea').forEach(function(inp) {
        obj[inp.name] = inp.value;
      });
      obj.page = currentPage;
      obj.id = obj.group_key + '_' + obj.item_name;
      pageData.options.push(obj);
    });

    var images = document.querySelectorAll('[data-type="image"]');
    pageData.images = [];
    images.forEach(function(el) {
      var obj = {};
      el.querySelectorAll('input:not([type="file"]),textarea').forEach(function(inp) {
        if (inp.name) obj[inp.name] = inp.value;
      });
      obj.page = currentPage;
      obj.id = obj.section_key + '_' + (obj.order || 0);
      pageData.images.push(obj);
    });
  }

  function showStatus(msg, type) {
    var el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg show ' + type;
    setTimeout(function() { el.className = 'status-msg'; }, 3000);
  }
})();
</script>
</body>
</html>
